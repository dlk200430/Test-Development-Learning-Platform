<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataHub - 赛博科技仪表盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a0f;
      --bg-card: rgba(20, 20, 30, 0.6);
      --neon-blue: #00d4ff;
      --neon-purple: #a855f7;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 动态背景 */
    .bg-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* 标题区域 */
    .header {
      text-align: center;
      margin-bottom: 50px;
      position: relative;
      padding: 30px;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
      animation: borderFlow 3s linear infinite;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-blue), transparent);
    }

    @keyframes borderFlow {
      0% { background-position: -200px 0; }
      100% { background-position: 200px 0; }
    }

    .header h1 {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    }

    .header p {
      color: var(--text-secondary);
      font-size: 16px;
    }

    /* 指标卡片网格 */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    /* 卡片基础样式 */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 28px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(0, 212, 255, 0.1);
    }

    .card:hover::before {
      opacity: 1;
    }

    /* 指标卡片 */
    .metric-card {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .metric-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      position: relative;
    }

    .metric-icon.blue {
      background: rgba(0, 212, 255, 0.15);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .metric-icon.purple {
      background: rgba(168, 85, 247, 0.15);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
    }

    .metric-icon.green {
      background: rgba(34, 197, 94, 0.15);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
    }

    .metric-info {
      flex: 1;
    }

    .metric-label {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--neon-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .metric-change {
      font-size: 13px;
      color: #22c55e;
      margin-top: 4px;
    }

    /* 图表卡片 */
    .chart-card {
      margin-bottom: 40px;
    }

    .chart-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .chart-card h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .chart-tabs {
      display: flex;
      gap: 12px;
    }

    .chart-tab {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border-color);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .chart-tab.active {
      background: rgba(0, 212, 255, 0.15);
      color: var(--neon-blue);
      border-color: var(--neon-blue);
    }

    /* 柱状图 */
    .chart-container {
      height: 280px;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding: 20px 0;
      position: relative;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      width: 100%;
      height: 220px;
      position: relative;
    }

    .chart-bar {
      width: 45px;
      background: linear-gradient(180deg, var(--neon-blue), var(--neon-purple));
      border-radius: 8px 8px 0 0;
      position: relative;
      transition: all 0.3s ease;
      cursor: pointer;
      animation: barGrow 1s ease-out forwards;
    }

    .chart-bar:nth-child(1) { height: 60%; animation-delay: 0.1s; }
    .chart-bar:nth-child(2) { height: 80%; animation-delay: 0.2s; }
    .chart-bar:nth-child(3) { height: 45%; animation-delay: 0.3s; }
    .chart-bar:nth-child(4) { height: 95%; animation-delay: 0.4s; }
    .chart-bar:nth-child(5) { height: 70%; animation-delay: 0.5s; }
    .chart-bar:nth-child(6) { height: 85%; animation-delay: 0.6s; }
    .chart-bar:nth-child(7) { height: 55%; animation-delay: 0.7s; }

    @keyframes barGrow {
      from { transform: scaleY(0); transform-origin: bottom; }
      to { transform: scaleY(1); transform-origin: bottom; }
    }

    .chart-bar:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }

    .chart-bar::before {
      content: attr(data-value);
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 600;
      color: var(--neon-blue);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .chart-bar:hover::before {
      opacity: 1;
    }

    .chart-labels {
      display: flex;
      justify-content: space-around;
      margin-top: 12px;
      padding: 0 10px;
    }

    .chart-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* 活动列表 */
    .activity-card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .activity-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--border-color);
    }

    .activity-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .activity-icon.user { background: rgba(0, 212, 255, 0.15); }
    .activity-icon.payment { background: rgba(168, 85, 247, 0.15); }
    .activity-icon.alert { background: rgba(239, 68, 68, 0.15); }
    .activity-icon.sync { background: rgba(34, 197, 94, 0.15); }

    .activity-content {
      flex: 1;
    }

    .activity-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .activity-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .activity-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-success {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .badge-info {
      background: rgba(0, 212, 255, 0.15);
      color: var(--neon-blue);
    }

    .badge-warning {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 20px 16px;
      }

      .header h1 {
        font-size: 28px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .chart-bars {
        height: 180px;
      }

      .chart-bar {
        width: 30px;
      }

      .chart-labels {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="container">
    <!-- 标题区域 -->
    <div class="header">
      <h1>DataHub</h1>
      <p>赛博科技数据仪表盘 · 实时监控系统</p>
    </div>

    <!-- 指标卡片 -->
    <div class="metrics-grid">
      <div class="card metric-card">
        <div class="metric-icon blue">👥</div>
        <div class="metric-info">
          <div class="metric-label">总用户数</div>
          <div class="metric-value" data-target="128400" data-suffix="K">0</div>
          <div class="metric-change">↑ 12.5% 较上月</div>
        </div>
      </div>

      <div class="card metric-card">
        <div class="metric-icon purple">📊</div>
        <div class="metric-info">
          <div class="metric-label">活跃率</div>
          <div class="metric-value" data-target="87.3" data-suffix="%">0</div>
          <div class="metric-change">↑ 3.2% 较上月</div>
        </div>
      </div>

      <div class="card metric-card">
        <div class="metric-icon green">💰</div>
        <div class="metric-info">
          <div class="metric-label">总收入</div>
          <div class="metric-value" data-target="54200" data-prefix="$" data-suffix="K">0</div>
          <div class="metric-change">↑ 8.7% 较上月</div>
        </div>
      </div>
    </div>

    <!-- 图表卡片 -->
    <div class="card chart-card">
      <div class="card-header">
        <h3>📈 趋势分析</h3>
        <div class="chart-tabs">
          <button class="chart-tab active">周</button>
          <button class="chart-tab">月</button>
          <button class="chart-tab">年</button>
        </div>
      </div>
      <div class="chart-container">
        <div class="chart-bars">
          <div class="chart-bar" data-value="2.4K"></div>
          <div class="chart-bar" data-value="3.2K"></div>
          <div class="chart-bar" data-value="1.8K"></div>
          <div class="chart-bar" data-value="3.8K"></div>
          <div class="chart-bar" data-value="2.8K"></div>
          <div class="chart-bar" data-value="3.4K"></div>
          <div class="chart-bar" data-value="2.2K"></div>
        </div>
      </div>
      <div class="chart-labels">
        <span class="chart-label">周一</span>
        <span class="chart-label">周二</span>
        <span class="chart-label">周三</span>
        <span class="chart-label">周四</span>
        <span class="chart-label">周五</span>
        <span class="chart-label">周六</span>
        <span class="chart-label">周日</span>
      </div>
    </div>

    <!-- 活动列表 -->
    <div class="card activity-card">
      <h3>🕐 最近活动</h3>
      <div class="activity-list">
        <div class="activity-item">
          <div class="activity-icon user">👤</div>
          <div class="activity-content">
            <div class="activity-title">新用户注册</div>
            <div class="activity-time">张三 刚刚注册了账号</div>
          </div>
          <span class="activity-badge badge-success">成功</span>
        </div>

        <div class="activity-item">
          <div class="activity-icon payment">💳</div>
          <div class="activity-content">
            <div class="activity-title">支付完成</div>
            <div class="activity-time">李四 成功购买 VIP 会员</div>
          </div>
          <span class="activity-badge badge-info">¥299</span>
        </div>

        <div class="activity-item">
          <div class="activity-icon alert">⚠️</div>
          <div class="activity-content">
            <div class="activity-title">系统告警</div>
            <div class="activity-time">服务器 CPU 使用率超过 90%</div>
          </div>
          <span class="activity-badge badge-warning">警告</span>
        </div>

        <div class="activity-item">
          <div class="activity-icon sync">🔄</div>
          <div class="activity-content">
            <div class="activity-title">数据同步</div>
            <div class="activity-time">数据库同步完成 · 共 1,284 条记录</div>
          </div>
          <span class="activity-badge badge-success">完成</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 数字滚动动画
    function animateValue(element, start, end, duration, prefix = '', suffix = '') {
      const startTime = performance.now()
      
      function update(currentTime) {
        const elapsed = currentTime - startTime
        const progress = Math.min(elapsed / duration, 1)
        
        // 使用 easeOutExpo 缓动函数
        const easeOutExpo = 1 - Math.pow(2, -10 * progress)
        const current = start + (end - start) * easeOutExpo
        
        // 格式化数字
        let displayValue
        if (end >= 1000) {
          displayValue = Math.floor(current).toLocaleString()
        } else if (end < 100) {
          displayValue = current.toFixed(1)
        } else {
          displayValue = Math.floor(current)
        }
        
        element.textContent = prefix + displayValue + suffix
        
        if (progress < 1) {
          requestAnimationFrame(update)
        }
      }
      
      requestAnimationFrame(update)
    }

    // 页面加载后启动动画
    document.addEventListener('DOMContentLoaded', () => {
      const metricValues = document.querySelectorAll('.metric-value')
      
      metricValues.forEach((el, index) => {
        const target = parseFloat(el.dataset.target)
        const prefix = el.dataset.prefix || ''
        const suffix = el.dataset.suffix || ''
        
        // 错开启动时间
        setTimeout(() => {
          animateValue(el, 0, target, 2000, prefix, suffix)
        }, index * 200)
      })
    })

    // 图表标签切换
    document.querySelectorAll('.chart-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'))
        this.classList.add('active')
      })
    })

    // 鼠标移动光效
    document.addEventListener('mousemove', (e) => {
      const cards = document.querySelectorAll('.card')
      cards.forEach(card => {
        const rect = card.getBoundingClientRect()
        const x = e.clientX - rect.left
        const y = e.clientY - rect.top
        
        if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
          card.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(0, 212, 255, 0.1), transparent 40%), var(--bg-card)`
        } else {
          card.style.background = 'var(--bg-card)'
        }
      })
    })
  </script>
</body>
</html>
